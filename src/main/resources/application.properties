spring.application.name=messaging-engine

server.port=8080

logging.file.name=/opt/messaging/logs/app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=14

spring.datasource.url=jdbc:mysql://192.168.0.247:3306/messaging_db?serverTimezone=Asia/Seoul
spring.datasource.username=messaging_user
spring.datasource.password=1212
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Actuator 엔드포인트 노출
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

# Spring Boot 3.x에서 변경된 키
management.prometheus.metrics.export.enabled=true

# Tomcat 스레드 메트릭 활성화
server.tomcat.mbeanregistry.enabled=true
management.metrics.enable.tomcat=true
management.metrics.tags.application=messaging-engine